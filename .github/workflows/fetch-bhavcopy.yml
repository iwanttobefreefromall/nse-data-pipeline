name: Fetch NSE F&O Bhavcopy

on:
  schedule:
    # Runs at 1:35 PM UTC (7:05 PM IST) Mon-Fri
    - cron: '35 13 * * 1-5'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download and extract Bhavcopy
        run: |
          # We check the last 3 days to handle weekends and trading holidays automatically
          for i in {0..2}; do
            DAY=$(TZ='Asia/Kolkata' date -d "$i days ago" +'%d')
            MON=$(TZ='Asia/Kolkata' date -d "$i days ago" +'%b' | tr '[:lower:]' '[:upper:]')
            YEAR=$(TZ='Asia/Kolkata' date -d "$i days ago" +'%Y')
            URL="https://archives.nseindia.com/content/historical/DERIVATIVES/${YEAR}/${MON}/${DAY}/fo${DAY}${MON}${YEAR}bhavcopy.zip"
            
            echo "Trying: $URL"
            
            # Download with a Chrome Browser User-Agent to bypass basic bot blocks
            HTTP_CODE=$(curl -sL -w "%{http_code}" -o bhavcopy.zip \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              "$URL")
            
            # Check if HTTP code is 200 (OK) AND the file is actually a Zip archive, not HTML
            if [ "$HTTP_CODE" -eq 200 ] && file bhavcopy.zip | grep -q "Zip archive"; then
              echo "Success! Found valid ZIP file."
              break
            else
              echo "Failed to get valid ZIP (HTTP $HTTP_CODE). Trying older date..."
              rm -f bhavcopy.zip
            fi
          done
          
          # Safety check
